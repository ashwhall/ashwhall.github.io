<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timesheet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <style>
    body {
      padding-bottom: 5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.5rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.25rem;
    }

    .icon-btn {
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      border-radius: var(--pico-border-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2.75rem;
      min-height: 2.75rem;
      color: inherit;
      box-shadow: none;
    }

    .icon-btn:hover {
      background: var(--pico-secondary-background);
    }

    /* Settings panel */
    .settings-panel {
      margin-bottom: 1.25rem;
    }

    .settings-section {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 0.875rem 1.125rem;
      margin-bottom: 1rem;
    }

    .settings-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--pico-muted-color);
      margin: 0 0 0.625rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 2.5rem;
    }

    .settings-row + .settings-row {
      border-top: 1px solid var(--pico-muted-border-color);
    }

    .settings-row .row-label {
      font-size: 0.9375rem;
      margin: 0;
    }

    .settings-row input[type="checkbox"] {
      margin: 0;
    }

    .settings-row select {
      width: auto;
      margin: 0;
      min-width: 10rem;
      padding-top: 0.375rem;
      padding-bottom: 0.375rem;
      font-size: 0.875rem;
    }

    .settings-row .reset-btn {
      margin: 0;
      padding: 0.375rem 0.875rem;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* Day cards */
    .day-card {
      margin-bottom: 1rem;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.625rem;
    }

    .day-name-group {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .day-label {
      font-weight: 600;
      font-size: 1rem;
    }

    .day-date {
      font-size: 0.8rem;
      color: var(--pico-muted-color);
    }

    .day-total {
      cursor: pointer;
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      border: none;
      min-height: 2.25rem;
      min-width: 5.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      font-size: 0.9375rem;
      font-weight: 600;
      box-shadow: none;
      transition: opacity 0.15s;
    }

    .day-total:hover {
      opacity: 0.82;
    }

    .day-total.has-hours {
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    .day-total.zero {
      background: transparent;
      color: var(--pico-muted-color);
      border: 1px solid var(--pico-muted-border-color);
    }

    /* Block rows */
    .block-row {
      display: grid;
      grid-template-columns: 1fr 1fr 2.5rem;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.375rem;
    }

    .block-row input[type="time"] {
      margin: 0;
      min-height: 2.75rem;
      font-size: 1rem;
    }

    .block-row input.invalid {
      --pico-border-color: var(--pico-del-color, #c0392b);
      background-color: color-mix(in srgb, var(--pico-del-color, #c0392b) 8%, transparent);
    }

    .remove-btn {
      min-width: 2.5rem;
      min-height: 2.75rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .add-block-btn {
      width: 100%;
      margin-top: 0.25rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: none;
    }

    /* Week footer */
    .week-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--pico-background-color);
      border-top: 1px solid var(--pico-muted-border-color);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 10;
    }

    .week-footer-label {
      font-size: 0.875rem;
      color: var(--pico-muted-color);
      margin: 0;
    }

    .week-total-btn {
      cursor: pointer;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
      border: none;
      padding: 0.4rem 1.25rem;
      border-radius: 2rem;
      min-height: 2.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 700;
      box-shadow: none;
      transition: opacity 0.15s;
    }

    .week-total-btn:hover {
      opacity: 0.82;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--pico-contrast-background, #1a1a1a);
      color: var(--pico-contrast-inverse, #fff);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    .copy-icon {
      opacity: 0.7;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Timesheet</h1>
      <div class="header-actions">
        <button class="icon-btn" id="settings-toggle" aria-label="Settings" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
          <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings panel -->
    <div class="settings-panel" id="settings-panel" hidden>
      <div class="settings-section">
        <h3>Options</h3>
        <div class="settings-row">
          <span class="row-label">Include weekends</span>
          <input type="checkbox" id="include-weekends" role="switch" />
        </div>
        <div class="settings-row">
          <span class="row-label">Copy format</span>
          <select id="copy-format">
            <option value="decimal">Decimal (7.5)</option>
            <option value="hms">HH:MM (7:30)</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <h3>Data</h3>
        <div class="settings-row">
          <span class="row-label">Clear all entries for a new week</span>
          <button class="secondary outline reset-btn" id="reset-btn">Reset week</button>
        </div>
      </div>
    </div>

    <!-- Day list -->
    <div id="days-container"></div>
  </main>

  <!-- Week total footer -->
  <div class="week-footer">
    <span class="week-footer-label">Week total</span>
    <button class="week-total-btn" id="week-total-btn" title="Copy to clipboard">
      <span id="week-total-display">0:00</span>
      <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'timesheet.v1';
    const DAYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const DAY_LABELS = {
      mon: 'Monday', tue: 'Tuesday', wed: 'Wednesday',
      thu: 'Thursday', fri: 'Friday', sat: 'Saturday', sun: 'Sunday',
    };

    // SVG snippets
    const SVG_COPY = `<svg class="copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const SVG_PLUS = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    const SVG_X = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    // ─── State ────────────────────────────────────────────────────────────────
    let state;

    function defaultDays() {
      return DAYS.reduce((acc, d) => ({ ...acc, [d]: [{ start: '', end: '' }] }), {});
    }

    function defaultState() {
      return {
        theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
        includeWeekends: false,
        copyFormat: 'decimal',
        days: defaultDays(),
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          state = { ...defaultState(), ...parsed };
          // Ensure all days exist with at least one block
          for (const d of DAYS) {
            if (!Array.isArray(state.days[d]) || !state.days[d].length) {
              state.days[d] = [{ start: '', end: '' }];
            }
          }
          return;
        }
      } catch (_) {}
      state = defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // ─── Theme ────────────────────────────────────────────────────────────────
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', state.theme);
      const dark = state.theme === 'dark';
      document.getElementById('icon-sun').style.display = dark ? '' : 'none';
      document.getElementById('icon-moon').style.display = dark ? 'none' : '';
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      saveState();
    });

    // ─── Time math ───────────────────────────────────────────────────────────
    function parseMins(t) {
      if (!t) return null;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function blockMins(block) {
      const s = parseMins(block.start);
      const e = parseMins(block.end);
      if (s === null || e === null || e <= s) return null;
      return e - s;
    }

    function dayTotalMins(dayKey) {
      return state.days[dayKey].reduce((sum, b) => sum + (blockMins(b) ?? 0), 0);
    }

    function activeDays() {
      return state.includeWeekends ? DAYS : DAYS.slice(0, 5);
    }

    function weekTotalMins() {
      return activeDays().reduce((sum, d) => sum + dayTotalMins(d), 0);
    }

    function formatMins(mins) {
      if (mins === 0) return state.copyFormat === 'decimal' ? '0' : '0:00';
      if (state.copyFormat === 'decimal') {
        const val = mins / 60;
        // Up to 2 decimal places, strip trailing zeros
        return parseFloat(val.toFixed(2)).toString();
      }
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}:${String(m).padStart(2, '0')}`;
    }

    // ─── Copy / Toast ─────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showToast('Copied!');
    }

    // ─── Week date helpers ────────────────────────────────────────────────────
    function getMondayOfCurrentWeek() {
      const today = new Date();
      const dow = today.getDay(); // 0=Sun
      const offset = dow === 0 ? -6 : 1 - dow;
      const mon = new Date(today);
      mon.setDate(today.getDate() + offset);
      return mon;
    }

    function getDayDate(dayIndex) {
      const mon = getMondayOfCurrentWeek();
      const d = new Date(mon);
      d.setDate(mon.getDate() + dayIndex);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // ─── Render ───────────────────────────────────────────────────────────────
    function renderDays() {
      const container = document.getElementById('days-container');
      container.innerHTML = '';

      activeDays().forEach((dayKey, dayIndex) => {
        const blocks = state.days[dayKey];
        const totalMins = dayTotalMins(dayKey);
        const totalText = formatMins(totalMins);
        const hasHours = totalMins > 0;

        const article = document.createElement('article');
        article.className = 'day-card';

        // Day header
        const header = document.createElement('div');
        header.className = 'day-header';

        const nameGroup = document.createElement('div');
        nameGroup.className = 'day-name-group';
        nameGroup.innerHTML = `<span class="day-label">${DAY_LABELS[dayKey]}</span><span class="day-date">${getDayDate(dayIndex)}</span>`;

        const totalBtn = document.createElement('button');
        totalBtn.className = `day-total ${hasHours ? 'has-hours' : 'zero'}`;
        totalBtn.title = 'Copy to clipboard';
        totalBtn.innerHTML = `${escHtml(totalText)} ${SVG_COPY}`;
        totalBtn.addEventListener('click', () => copyText(totalText));

        header.appendChild(nameGroup);
        header.appendChild(totalBtn);
        article.appendChild(header);

        // Block rows
        blocks.forEach((block, blockIdx) => {
          const invalid = block.start && block.end &&
            parseMins(block.end) !== null && parseMins(block.start) !== null &&
            parseMins(block.end) <= parseMins(block.start);

          const row = document.createElement('div');
          row.className = 'block-row';

          const startInput = document.createElement('input');
          startInput.type = 'time';
          startInput.value = block.start;
          startInput.setAttribute('aria-label', `${DAY_LABELS[dayKey]} block ${blockIdx + 1} start`);
          if (invalid) startInput.classList.add('invalid');

          const endInput = document.createElement('input');
          endInput.type = 'time';
          endInput.value = block.end;
          endInput.setAttribute('aria-label', `${DAY_LABELS[dayKey]} block ${blockIdx + 1} end`);
          if (invalid) endInput.classList.add('invalid');

          startInput.addEventListener('change', () => {
            state.days[dayKey][blockIdx].start = startInput.value;
            saveState();
            renderDays();
          });

          endInput.addEventListener('change', () => {
            state.days[dayKey][blockIdx].end = endInput.value;
            saveState();
            renderDays();
          });

          const removeBtn = document.createElement('button');
          removeBtn.className = 'secondary outline remove-btn';
          removeBtn.setAttribute('aria-label', 'Remove block');
          removeBtn.innerHTML = SVG_X;
          removeBtn.hidden = blocks.length === 1;
          removeBtn.addEventListener('click', () => {
            state.days[dayKey].splice(blockIdx, 1);
            saveState();
            renderDays();
          });

          row.appendChild(startInput);
          row.appendChild(endInput);
          row.appendChild(removeBtn);
          article.appendChild(row);
        });

        // Add block button
        const addBtn = document.createElement('button');
        addBtn.className = 'secondary outline add-block-btn';
        addBtn.innerHTML = `${SVG_PLUS} Add block`;
        addBtn.addEventListener('click', () => {
          state.days[dayKey].push({ start: '', end: '' });
          saveState();
          renderDays();
          // Focus the new block's start input
          setTimeout(() => {
            const rows = document.querySelectorAll(`#days-container .day-card:nth-child(${dayIndex + 1}) .block-row`);
            const lastRow = rows[rows.length - 1];
            lastRow?.querySelector('input[type=time]')?.focus();
          }, 0);
        });
        article.appendChild(addBtn);

        container.appendChild(article);
      });

      // Update week total
      const mins = weekTotalMins();
      document.getElementById('week-total-display').textContent = formatMins(mins);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ─── Settings panel ───────────────────────────────────────────────────────
    let settingsOpen = false;

    document.getElementById('settings-toggle').addEventListener('click', () => {
      settingsOpen = !settingsOpen;
      document.getElementById('settings-panel').hidden = !settingsOpen;
    });

    function applySettings() {
      document.getElementById('include-weekends').checked = state.includeWeekends;
      document.getElementById('copy-format').value = state.copyFormat;
    }

    document.getElementById('include-weekends').addEventListener('change', (e) => {
      state.includeWeekends = e.target.checked;
      saveState();
      renderDays();
    });

    document.getElementById('copy-format').addEventListener('change', (e) => {
      state.copyFormat = e.target.value;
      saveState();
      renderDays();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('Clear all entries and start a new week?')) return;
      state.days = defaultDays();
      saveState();
      settingsOpen = false;
      document.getElementById('settings-panel').hidden = true;
      renderDays();
      showToast('Week cleared');
    });

    // ─── Week total copy ──────────────────────────────────────────────────────
    document.getElementById('week-total-btn').addEventListener('click', () => {
      copyText(formatMins(weekTotalMins()));
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    loadState();
    applyTheme();
    applySettings();
    renderDays();
  </script>
</body>
</html>
