<!DOCTYPE html>
<html lang="en-GB">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Timesheet</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Timesheet" />
  <link rel="shortcut icon" href="/public/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/public/favicon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/public/favicon-512x512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png" />
  <script>
    // Apply theme before stylesheet to avoid flash
    (function () {
      try {
        const s = JSON.parse(localStorage.getItem('timesheet.v1') || '{}');
        const theme = s.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) { }
    })();
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#11191f" />
  <link rel="stylesheet" href="pico.min.css" />
  <style>
    body {
      padding-bottom: 5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.5rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.25rem;
    }

    .icon-btn {
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      border-radius: var(--pico-border-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2.75rem;
      min-height: 2.75rem;
      color: inherit;
      box-shadow: none;
    }

    .icon-btn:hover {
      background: var(--pico-secondary-background);
    }

    .icon-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .icon-btn:disabled:hover {
      background: none;
    }

    /* Week navigation */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.5rem;
    }

    .week-nav-label {
      font-size: 0.875rem;
      color: var(--pico-muted-color);
      text-align: center;
      flex: 1;
    }

    /* Settings panel */
    .settings-panel {
      margin-bottom: 1.25rem;
    }

    .settings-section {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 0.875rem 1.125rem;
      margin-bottom: 1rem;
    }

    .settings-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--pico-muted-color);
      margin: 0 0 0.625rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 2.5rem;
    }

    .settings-row+.settings-row {
      border-top: 1px solid var(--pico-muted-border-color);
    }

    .settings-row .row-label {
      font-size: 0.9375rem;
      margin: 0;
    }

    .settings-row input[type="checkbox"] {
      margin: 0;
    }

    .settings-row select {
      width: auto;
      margin: 0;
      min-width: 10rem;
      padding-top: 0.375rem;
      padding-bottom: 0.375rem;
      font-size: 0.875rem;
    }

    .build-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--pico-muted-color);
      opacity: 0.7;
      margin: 0.75rem 0 0;
    }

    .install-banner {
      position: fixed;
      left: 0.75rem;
      right: 0.75rem;
      bottom: 0.75rem;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 0.625rem 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 90;
    }

    .install-banner-actions {
      display: flex;
      gap: 0.4rem;
      margin-left: auto;
      flex-shrink: 0;
    }

    .install-banner .small-btn {
      margin: 0;
      padding: 0.3rem 0.7rem;
      font-size: 0.8125rem;
      box-shadow: none;
    }

    .bmc-line {
      text-align: center;
      margin: 1rem 0 0;
    }

    .bmc-link {
      display: inline-block;
      font-size: 0.8125rem;
      padding: 0.25rem 0.7rem;
      border-radius: 2rem;
      text-decoration: none;
      color: var(--pico-muted-color);
      border: 1px solid var(--pico-muted-border-color);
    }

    .bmc-link:hover {
      color: var(--pico-color);
      border-color: var(--pico-color);
    }

    .settings-row .reset-btn {
      margin: 0;
      padding: 0.375rem 0.875rem;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* Day cards */
    .day-card {
      margin-bottom: 1rem;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.625rem;
    }

    .day-name-group {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .day-label {
      font-weight: 600;
      font-size: 1rem;
    }

    .day-date {
      font-size: 0.8rem;
      color: var(--pico-muted-color);
    }

    .today-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pico-primary);
      background: color-mix(in srgb, var(--pico-primary) 12%, transparent);
      padding: 0.1rem 0.45rem;
      border-radius: 2rem;
    }

    .day-total {
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      border: none;
      min-height: 2.25rem;
      min-width: 5.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .day-total.has-hours {
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    .day-total.zero {
      background: transparent;
      color: var(--pico-muted-color);
      border: 1px solid var(--pico-muted-border-color);
    }

    .day-total.invalid,
    .day-total.invalid.zero {
      background: var(--pico-del-color, #c0392b);
      color: #fff;
      border-color: transparent;
    }

    /* Block rows */
    .block-row {
      display: grid;
      grid-template-columns: 1fr 1fr 2.5rem;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.375rem;
    }

    .block-row input[type="time"] {
      margin: 0;
      min-height: 2.75rem;
      font-size: 1rem;
    }

    .block-row input.invalid {
      --pico-border-color: var(--pico-del-color, #c0392b);
      background-color: color-mix(in srgb, var(--pico-del-color, #c0392b) 8%, transparent);
    }

    .remove-btn {
      min-width: 2.5rem;
      min-height: 2.75rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .add-block-btn {
      width: 100%;
      margin-top: 0.25rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: none;
    }

    /* Break row */
    .break-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.8125rem;
    }

    .break-row label {
      color: var(--pico-muted-color);
      margin: 0;
    }

    .break-row input[type="number"] {
      margin: 0;
      width: 5rem;
      min-height: 2.25rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .break-row input[type="number"]::-webkit-outer-spin-button,
    .break-row input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .add-break-btn {
      margin-top: 0.5rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.8125rem;
      box-shadow: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* Daily notes */
    .day-note-wrap {
      margin-top: 0.625rem;
    }

    .day-note {
      font-size: 0.8125rem;
      color: var(--pico-color);
      cursor: pointer;
      padding: 0.375rem 0.5rem;
      border-radius: var(--pico-border-radius);
      min-height: 2rem;
      display: flex;
      align-items: center;
      border: 1px solid transparent;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }

    .day-note:hover {
      border-color: var(--pico-muted-border-color);
      background: var(--pico-card-background-color);
    }

    .day-note.day-note-empty {
      font-style: italic;
      opacity: 0.5;
    }

    .day-note-editor {
      width: 100%;
      margin: 0;
      font-size: 0.8125rem;
      resize: vertical;
      min-height: 4rem;
    }

    .note-ok-btn {
      margin-top: 0.375rem;
      padding: 0.25rem 0.875rem;
      font-size: 0.8125rem;
      box-shadow: none;
    }

    /* Week footer */
    .week-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--pico-background-color);
      border-top: 1px solid var(--pico-muted-border-color);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      z-index: 10;
    }

    .week-footer-label {
      font-size: 0.875rem;
      color: var(--pico-muted-color);
      margin: 0;
      white-space: nowrap;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-btn {
      margin: 0;
      padding: 0.375rem 0.875rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      box-shadow: none;
      white-space: nowrap;
    }

    .week-total-btn {
      cursor: pointer;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
      border: none;
      padding: 0.4rem 1.25rem;
      border-radius: 2rem;
      min-height: 2.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 700;
      box-shadow: none;
      transition: opacity 0.15s;
    }

    .week-total-btn:hover {
      opacity: 0.82;
    }

    .week-total-btn.invalid {
      background: var(--pico-del-color, #c0392b);
      color: #fff;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--pico-contrast-background, #1a1a1a);
      color: var(--pico-contrast-inverse, #fff);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    .copy-icon {
      opacity: 0.7;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <main class="container">
    <header>
      <h1>Timesheet</h1>
      <div class="header-actions">
        <button class="icon-btn" id="settings-toggle" aria-label="Settings" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
          <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Week navigation -->
    <div class="week-nav">
      <button class="icon-btn" id="week-prev" aria-label="Previous week" title="Previous week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <span class="week-nav-label" id="week-nav-label"></span>
      <button class="icon-btn" id="week-next" aria-label="Next week" title="Next week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>

    <!-- Settings panel -->
    <div class="settings-panel" id="settings-panel" hidden>
      <div class="settings-section">
        <h3>Options</h3>
        <div class="settings-row">
          <span class="row-label">Week starts on</span>
          <select id="weekday-start">
            <option value="mon">Monday</option>
            <option value="tue">Tuesday</option>
            <option value="wed">Wednesday</option>
            <option value="thu">Thursday</option>
            <option value="fri">Friday</option>
            <option value="sat">Saturday</option>
            <option value="sun">Sunday</option>
          </select>
        </div>
        <div class="settings-row">
          <span class="row-label">Include weekends</span>
          <input type="checkbox" id="include-weekends" role="switch" />
        </div>
      </div>
      <div class="settings-section">
        <h3>Data</h3>
        <div class="settings-row">
          <span class="row-label">Clear all entries for a new week</span>
          <button class="secondary outline reset-btn" id="reset-btn">Reset week</button>
        </div>
      </div>
      <p class="bmc-line">
        <a class="bmc-link" href="https://www.buymeacoffee.com/ashwhall" target="_blank" rel="noopener">
          ☕ Buy me a coffee
        </a>
      </p>
      <p class="build-footer">Build date: <span id="build-date-value">-</span></p>
    </div>

    <!-- Day list -->
    <div id="days-container"></div>
  </main>

  <!-- Week total footer -->
  <div class="week-footer">
    <span class="week-footer-label">Week total</span>
    <div class="footer-actions">
      <button class="secondary outline summary-btn" id="summary-btn" title="Copy detailed summary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Summary
      </button>
      <button class="week-total-btn" id="week-total-btn" title="Copy to clipboard">
        <span id="week-total-display">0:00</span>
        <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Install hint banner -->
  <div class="install-banner" id="install-banner" hidden>
    <span id="install-banner-text"></span>
    <div class="install-banner-actions">
      <button class="secondary outline small-btn" id="install-banner-dismiss" type="button">Dismiss</button>
      <button class="primary small-btn" id="install-banner-install" type="button" hidden>Install</button>
    </div>
  </div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'timesheet.v1';
    const DAYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const DAY_LABELS = {
      mon: 'Monday', tue: 'Tuesday', wed: 'Wednesday',
      thu: 'Thursday', fri: 'Friday', sat: 'Saturday', sun: 'Sunday',
    };
    const DAY_DOW = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };

    const SVG_COPY = `<svg class="copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const SVG_PLUS = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    const SVG_X = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    // ─── State ────────────────────────────────────────────────────────────────
    let state;
    let editingNoteDay = null;

    function defaultDays() {
      return DAYS.reduce((acc, d) => ({ ...acc, [d]: [{ start: '', end: '' }] }), {});
    }

    function defaultNotes() {
      return DAYS.reduce((acc, d) => ({ ...acc, [d]: '' }), {});
    }

    function defaultBreaks() {
      return DAYS.reduce((acc, d) => ({ ...acc, [d]: 0 }), {});
    }

    function defaultState() {
      return {
        theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
        includeWeekends: false,
        weekdayStart: 'mon',
        weekStart: toDateStr(getWeekStartDate('mon')),
        weekLocked: false,
        days: defaultDays(),
        notes: defaultNotes(),
        breaks: defaultBreaks(),
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          state = { ...defaultState(), ...parsed };

          // Sanitize days
          for (const d of DAYS) {
            const day = state.days[d];
            const clean = Array.isArray(day)
              ? day.filter(b => b && typeof b === 'object').map(b => ({
                start: typeof b.start === 'string' ? b.start : '',
                end: typeof b.end === 'string' ? b.end : '',
              }))
              : [];
            state.days[d] = clean.length ? clean : [{ start: '', end: '' }];
          }

          // Sanitize notes
          if (!state.notes || typeof state.notes !== 'object') {
            state.notes = defaultNotes();
          }
          for (const d of DAYS) {
            if (typeof state.notes[d] !== 'string') state.notes[d] = '';
          }

          // Sanitize breaks
          if (!state.breaks || typeof state.breaks !== 'object') {
            state.breaks = defaultBreaks();
          }
          for (const d of DAYS) {
            const n = Number(state.breaks[d]);
            state.breaks[d] = Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
          }

          if (!DAYS.includes(state.weekdayStart)) {
            state.weekdayStart = 'mon';
          }
          if (!state.weekStart) {
            state.weekStart = toDateStr(getWeekStartDate(state.weekdayStart));
          }
          if (!state.weekLocked && !hasAnyEntries()) {
            state.weekStart = toDateStr(getWeekStartDate(state.weekdayStart));
          }
          saveState();
          return;
        }
      } catch (_) { }
      state = defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // ─── Theme ────────────────────────────────────────────────────────────────
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', state.theme);
      const dark = state.theme === 'dark';
      document.getElementById('icon-sun').style.display = dark ? '' : 'none';
      document.getElementById('icon-moon').style.display = dark ? 'none' : '';
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      saveState();
    });

    // ─── Time math ───────────────────────────────────────────────────────────
    function parseMins(t) {
      if (!t) return null;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function blockMins(block) {
      const s = parseMins(block.start);
      const e = parseMins(block.end);
      if (s === null || e === null || e <= s) return null;
      return e - s;
    }

    function overlappingIndices(blocks) {
      const valid = blocks.map((b, i) => {
        const s = parseMins(b.start);
        const e = parseMins(b.end);
        return (s !== null && e !== null && e > s) ? { s, e, i } : null;
      }).filter(Boolean);

      const bad = new Set();
      for (let a = 0; a < valid.length; a++) {
        for (let b = a + 1; b < valid.length; b++) {
          if (valid[a].s < valid[b].e && valid[b].s < valid[a].e) {
            bad.add(valid[a].i);
            bad.add(valid[b].i);
          }
        }
      }
      return bad;
    }

    function dayHasInvalid(blocks, overlapping) {
      if (overlapping.size > 0) return true;
      return blocks.some(b => {
        const s = parseMins(b.start);
        const e = parseMins(b.end);
        return s !== null && e !== null && e <= s;
      });
    }

    function dayTotalMins(blocks, overlapping) {
      return blocks.reduce((sum, b, i) => {
        if (overlapping.has(i)) return sum;
        return sum + (blockMins(b) ?? 0);
      }, 0);
    }

    function dayNetMins(dayKey) {
      const blocks = state.days[dayKey];
      const gross = dayTotalMins(blocks, overlappingIndices(blocks));
      const brk = state.breaks[dayKey] || 0;
      return Math.max(0, gross - brk);
    }

    function activeDays() {
      const startIdx = DAYS.indexOf(state.weekdayStart);
      const ordered = [...DAYS.slice(startIdx), ...DAYS.slice(0, startIdx)];
      return state.includeWeekends ? ordered : ordered.filter(d => d !== 'sat' && d !== 'sun');
    }

    function weekTotalMins() {
      return activeDays().reduce((sum, d) => sum + dayNetMins(d), 0);
    }

    function formatMins(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}:${String(m).padStart(2, '0')}`;
    }

    // ─── Copy / Toast ─────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showToast('Copied!');
    }

    // ─── Week date helpers ────────────────────────────────────────────────────
    function getWeekStartDate(startDay) {
      const today = new Date();
      const startDow = DAY_DOW[startDay];
      let offset = today.getDay() - startDow;
      if (offset < 0) offset += 7;
      const start = new Date(today);
      start.setDate(today.getDate() - offset);
      return start;
    }

    function toDateStr(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function parseWeekStart() {
      if (state.weekStart) {
        const [y, m, d] = state.weekStart.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      return getWeekStartDate(state.weekdayStart);
    }

    function hasAnyEntries() {
      return DAYS.some(d => state.days[d].some(b => b.start || b.end));
    }

    function dayOffset(dayKey) {
      const startDow = DAY_DOW[state.weekdayStart];
      const keyDow = DAY_DOW[dayKey];
      let offset = keyDow - startDow;
      if (offset < 0) offset += 7;
      return offset;
    }

    // ─── Week navigation ──────────────────────────────────────────────────────
    function shiftWeek(delta) {
      const monday = parseWeekStart();
      monday.setDate(monday.getDate() + delta * 7);
      state.weekStart = toDateStr(monday);
      state.weekLocked = true;
      editingNoteDay = null;
      saveState();
      renderDays();
    }

    document.getElementById('week-prev').addEventListener('click', () => shiftWeek(-1));

    document.getElementById('week-next').addEventListener('click', () => {
      if (toDateStr(parseWeekStart()) >= toDateStr(getWeekStartDate(state.weekdayStart))) return;
      shiftWeek(1);
    });

    // ─── Summary copy ─────────────────────────────────────────────────────────
    function formatDuration(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h > 0 && m > 0) return `${h}h ${m}m`;
      if (h > 0) return `${h}h`;
      return `${m}m`;
    }

    function buildSummary() {
      const monday = parseWeekStart();
      const lines = [];
      let firstDay = true;

      activeDays().forEach((dayKey, dayIndex) => {
        const blocks = state.days[dayKey];
        const overlapping = overlappingIndices(blocks);
        const validBlocks = blocks.filter((b, i) => !overlapping.has(i) && blockMins(b) !== null);
        const note = (state.notes[dayKey] || '').trim();
        const brk = state.breaks[dayKey] || 0;
        if (validBlocks.length === 0 && !note) return;

        const dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + dayOffset(dayKey));
        const dateStr = dayDate.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });

        const dayHeader = note
          ? `${DAY_LABELS[dayKey]} ${dateStr} - ${note}`
          : `${DAY_LABELS[dayKey]} ${dateStr}`;

        if (!firstDay) lines.push('');
        firstDay = false;

        lines.push(dayHeader);
        for (const b of validBlocks) {
          lines.push(`- ${b.start} - ${b.end} (${formatDuration(blockMins(b))})`);
        }
        if (brk > 0) {
          lines.push(`- Break        (-${formatDuration(brk)})`);
        }
        lines.push(`Day total: ${formatDuration(dayNetMins(dayKey))}`);
      });

      lines.push('');
      lines.push(`WEEK TOTAL: ${formatDuration(weekTotalMins())}`);

      return lines.join('\n');
    }

    document.getElementById('summary-btn').addEventListener('click', () => {
      copyText(buildSummary());
    });

    // ─── Render ───────────────────────────────────────────────────────────────
    function renderDays() {
      const container = document.getElementById('days-container');
      container.innerHTML = '';
      const monday = parseWeekStart();

      // Update week nav
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      document.getElementById('week-nav-label').textContent =
        `${monday.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} – ${sunday.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
      const atCurrentWeek = toDateStr(monday) >= toDateStr(getWeekStartDate(state.weekdayStart));
      document.getElementById('week-next').disabled = atCurrentWeek;

      activeDays().forEach((dayKey, dayIndex) => {
        const blocks = state.days[dayKey];
        const overlapping = overlappingIndices(blocks);
        const totalMins = dayNetMins(dayKey);
        const totalText = formatMins(totalMins);
        const hasHours = totalMins > 0;

        const article = document.createElement('article');
        article.className = 'day-card';

        // Day header
        const header = document.createElement('div');
        header.className = 'day-header';

        const nameGroup = document.createElement('div');
        nameGroup.className = 'day-name-group';
        const dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + dayOffset(dayKey));
        const dateStr = dayDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const isToday = toDateStr(dayDate) === toDateStr(new Date());
        nameGroup.innerHTML = `<span class="day-label">${DAY_LABELS[dayKey]}</span><span class="day-date">${dateStr}</span>${isToday ? '<span class="today-badge">Today</span>' : ''}`;

        const dayInvalid = dayHasInvalid(blocks, overlapping);
        const totalDisplay = document.createElement('div');
        totalDisplay.className = `day-total ${hasHours ? 'has-hours' : 'zero'}${dayInvalid ? ' invalid' : ''}`;
        totalDisplay.textContent = totalText;

        header.appendChild(nameGroup);
        header.appendChild(totalDisplay);
        article.appendChild(header);

        // Block rows
        blocks.forEach((block, blockIdx) => {
          const withinBlockInvalid = block.start && block.end &&
            parseMins(block.end) !== null && parseMins(block.start) !== null &&
            parseMins(block.end) <= parseMins(block.start);
          const invalid = withinBlockInvalid || overlapping.has(blockIdx);

          const row = document.createElement('div');
          row.className = 'block-row';

          const startInput = document.createElement('input');
          startInput.type = 'time';
          startInput.value = block.start;
          startInput.setAttribute('aria-label', `${DAY_LABELS[dayKey]} block ${blockIdx + 1} start`);
          if (invalid) startInput.classList.add('invalid');

          const endInput = document.createElement('input');
          endInput.type = 'time';
          endInput.value = block.end;
          endInput.setAttribute('aria-label', `${DAY_LABELS[dayKey]} block ${blockIdx + 1} end`);
          if (invalid) endInput.classList.add('invalid');

          startInput.addEventListener('change', () => {
            state.days[dayKey][blockIdx].start = startInput.value;
            saveState();
            renderDays();
          });

          endInput.addEventListener('change', () => {
            state.days[dayKey][blockIdx].end = endInput.value;
            saveState();
            renderDays();
          });

          const removeBtn = document.createElement('button');
          removeBtn.className = 'secondary outline remove-btn';
          removeBtn.setAttribute('aria-label', 'Remove block');
          removeBtn.innerHTML = SVG_X;
          removeBtn.hidden = blocks.length === 1;
          removeBtn.addEventListener('click', () => {
            state.days[dayKey].splice(blockIdx, 1);
            saveState();
            renderDays();
          });

          row.appendChild(startInput);
          row.appendChild(endInput);
          row.appendChild(removeBtn);
          article.appendChild(row);
        });

        // Add block button
        const addBtn = document.createElement('button');
        addBtn.className = 'secondary outline add-block-btn';
        addBtn.innerHTML = `${SVG_PLUS} Add block`;
        addBtn.addEventListener('click', () => {
          state.days[dayKey].push({ start: '', end: '' });
          saveState();
          renderDays();
          setTimeout(() => {
            const rows = document.querySelectorAll(`#days-container .day-card:nth-child(${dayIndex + 1}) .block-row`);
            const lastRow = rows[rows.length - 1];
            lastRow?.querySelector('input[type=time]')?.focus();
          }, 0);
        });
        article.appendChild(addBtn);

        // Break
        const brkMins = state.breaks[dayKey] || 0;
        if (brkMins > 0) {
          const breakRow = document.createElement('div');
          breakRow.className = 'break-row';

          const breakLabel = document.createElement('label');
          breakLabel.textContent = 'Break (min)';
          breakLabel.setAttribute('for', `break-${dayKey}`);

          const breakInput = document.createElement('input');
          breakInput.type = 'number';
          breakInput.id = `break-${dayKey}`;
          breakInput.min = '0';
          breakInput.step = '1';
          breakInput.inputMode = 'numeric';
          breakInput.value = String(brkMins);
          breakInput.setAttribute('aria-label', `${DAY_LABELS[dayKey]} break in minutes`);
          breakInput.addEventListener('input', () => {
            const n = Number(breakInput.value);
            state.breaks[dayKey] = Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
            saveState();
            const newTotal = formatMins(dayNetMins(dayKey));
            totalDisplay.textContent = newTotal;
            totalDisplay.classList.toggle('has-hours', dayNetMins(dayKey) > 0);
            totalDisplay.classList.toggle('zero', dayNetMins(dayKey) === 0);
            document.getElementById('week-total-display').textContent = formatMins(weekTotalMins());
          });

          const removeBreakBtn = document.createElement('button');
          removeBreakBtn.className = 'secondary outline remove-btn';
          removeBreakBtn.setAttribute('aria-label', 'Remove break');
          removeBreakBtn.innerHTML = SVG_X;
          removeBreakBtn.addEventListener('click', () => {
            state.breaks[dayKey] = 0;
            saveState();
            renderDays();
          });

          breakRow.appendChild(breakLabel);
          breakRow.appendChild(breakInput);
          breakRow.appendChild(removeBreakBtn);
          article.appendChild(breakRow);
        } else {
          const addBreakBtn = document.createElement('button');
          addBreakBtn.className = 'secondary outline add-break-btn';
          addBreakBtn.innerHTML = `${SVG_PLUS} Add break`;
          addBreakBtn.addEventListener('click', () => {
            state.breaks[dayKey] = 30;
            saveState();
            renderDays();
            setTimeout(() => {
              document.getElementById(`break-${dayKey}`)?.focus();
            }, 0);
          });
          article.appendChild(addBreakBtn);
        }

        // Notes
        const noteWrap = document.createElement('div');
        noteWrap.className = 'day-note-wrap';

        if (editingNoteDay === dayKey) {
          const textarea = document.createElement('textarea');
          textarea.className = 'day-note-editor';
          textarea.value = state.notes[dayKey] || '';
          textarea.placeholder = 'Add a note for this day…';
          textarea.rows = 3;

          const commitNote = () => {
            state.notes[dayKey] = textarea.value;
            editingNoteDay = null;
            saveState();
            renderDays();
          };

          textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') commitNote();
          });

          const okBtn = document.createElement('button');
          okBtn.className = 'secondary outline note-ok-btn';
          okBtn.textContent = 'OK';
          okBtn.addEventListener('click', commitNote);

          noteWrap.appendChild(textarea);
          noteWrap.appendChild(okBtn);
          setTimeout(() => textarea.focus(), 0);
        } else {
          const noteDisplay = document.createElement('div');
          const noteText = state.notes[dayKey] || '';
          noteDisplay.className = `day-note${noteText ? '' : ' day-note-empty'}`;
          noteDisplay.textContent = noteText || 'Add note…';
          noteDisplay.setAttribute('tabindex', '0');
          noteDisplay.setAttribute('aria-label', `${DAY_LABELS[dayKey]} note — click to edit`);
          noteDisplay.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              editingNoteDay = dayKey;
              renderDays();
            }
          });
          noteDisplay.addEventListener('click', () => {
            editingNoteDay = dayKey;
            renderDays();
          });
          noteWrap.appendChild(noteDisplay);
        }

        article.appendChild(noteWrap);
        container.appendChild(article);
      });

      // Update week total
      const mins = weekTotalMins();
      document.getElementById('week-total-display').textContent = formatMins(mins);
      const weekInvalid = activeDays().some(d => {
        const b = state.days[d];
        return dayHasInvalid(b, overlappingIndices(b));
      });
      document.getElementById('week-total-btn').classList.toggle('invalid', weekInvalid);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ─── Settings panel ───────────────────────────────────────────────────────
    let settingsOpen = false;

    function applySettingsVisibility() {
      document.getElementById('settings-panel').hidden = !settingsOpen;
      // Hide the main timesheet UI when settings is open so it acts as a
      // swap-view (matching the JobJot pattern), not an inserted block.
      document.querySelector('.week-nav').hidden = settingsOpen;
      document.getElementById('days-container').hidden = settingsOpen;
      document.querySelector('.week-footer').hidden = settingsOpen;
    }

    document.getElementById('settings-toggle').addEventListener('click', () => {
      settingsOpen = !settingsOpen;
      applySettingsVisibility();
    });

    function applySettings() {
      document.getElementById('weekday-start').value = state.weekdayStart;
      document.getElementById('include-weekends').checked = state.includeWeekends;
    }

    document.getElementById('weekday-start').addEventListener('change', (e) => {
      state.weekdayStart = e.target.value;
      state.weekLocked = false;
      state.weekStart = toDateStr(getWeekStartDate(state.weekdayStart));
      saveState();
      renderDays();
    });

    document.getElementById('include-weekends').addEventListener('change', (e) => {
      state.includeWeekends = e.target.checked;
      saveState();
      renderDays();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('Clear all entries and start a new week?')) return;
      state.days = defaultDays();
      state.notes = defaultNotes();
      state.breaks = defaultBreaks();
      state.weekLocked = false;
      state.weekStart = toDateStr(getWeekStartDate(state.weekdayStart));
      saveState();
      editingNoteDay = null;
      settingsOpen = false;
      applySettingsVisibility();
      renderDays();
      showToast('Week cleared');
    });

    // ─── Week total copy ──────────────────────────────────────────────────────
    document.getElementById('week-total-btn').addEventListener('click', () => {
      copyText(formatMins(weekTotalMins()));
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    loadState();
    applyTheme();
    applySettings();
    renderDays();

    // ─── PWA: service worker, install hint, persistence, build date ─────────

    // Build date — Jekyll renders build.json at deploy time; local dev keeps
    // the template literal and we fall back to "dev (local)".
    (async () => {
      const el = document.getElementById('build-date-value');
      if (!el) return;
      el.textContent = 'dev (local)';
      try {
        const res = await fetch('build.json', { cache: 'no-cache' });
        if (!res.ok) return;
        const text = await res.text();
        if (text.includes('{{')) return;
        const data = JSON.parse(text);
        const d = new Date(data.build);
        if (isNaN(d.getTime())) return;
        el.textContent = d.toLocaleString(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: false,
        });
      } catch (_) { }
    })();

    // Install banner — Android prompt event, iOS Share hint, generic fallback.
    const banner = document.getElementById('install-banner');
    const bannerText = document.getElementById('install-banner-text');
    const bannerInstall = document.getElementById('install-banner-install');
    const bannerDismiss = document.getElementById('install-banner-dismiss');

    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);

    function showInstallBanner(text, withInstallBtn) {
      bannerText.textContent = text;
      bannerInstall.hidden = !withInstallBtn;
      banner.hidden = false;
    }

    bannerDismiss.addEventListener('click', () => {
      banner.hidden = true;
      state.installHintDismissed = true;
      saveState();
    });

    let deferredInstallPrompt = null;
    let installPromptFired = false;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPromptFired = true;
      deferredInstallPrompt = e;
      if (isStandalone || state.installHintDismissed) return;
      showInstallBanner('Install Timesheet for quicker access and offline use.', true);
    });

    bannerInstall.addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      try { await deferredInstallPrompt.userChoice; } catch (_) { }
      deferredInstallPrompt = null;
      banner.hidden = true;
    });

    window.addEventListener('appinstalled', () => {
      banner.hidden = true;
      deferredInstallPrompt = null;
    });

    if (isIOS && !isStandalone && !state.installHintDismissed) {
      showInstallBanner('Install Timesheet for quicker access and offline use. Tap Share → Add to Home Screen.', false);
    }
    if (isAndroid && !isStandalone && !state.installHintDismissed) {
      setTimeout(() => {
        if (installPromptFired) return;
        if (!banner.hidden) return;
        showInstallBanner('Install Timesheet for quicker access and offline use. Menu (⋮) → Install / Add to Home Screen.', false);
      }, 4000);
    }

    // Persistent storage — ask once with explanation.
    async function maybeRequestPersistence() {
      if (!navigator.storage?.persist) return;
      if (state.persistAsked) return;
      let already = false;
      try { already = await navigator.storage.persisted(); } catch (_) { }
      if (already) {
        state.persistAsked = true;
        saveState();
        return;
      }
      const ok = confirm(
        'Timesheet stores your hours on this device. Allow persistent storage so the browser doesn\'t clear them? You may see a system prompt next.',
      );
      state.persistAsked = true;
      saveState();
      if (!ok) return;
      try { await navigator.storage.persist(); } catch (_) { }
    }
    setTimeout(() => { maybeRequestPersistence(); }, 600);

    // Service worker registration — toast + reload when an update lands.
    if ('serviceWorker' in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          const trackInstall = (worker) => {
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && hadController) {
                showToast('Update downloaded — reloading…');
              }
            });
          };
          trackInstall(reg.installing);
          reg.addEventListener('updatefound', () => trackInstall(reg.installing));

          reg.update().catch(() => { });
          window.addEventListener('focus', () => reg.update().catch(() => { }));
        }).catch(() => { });
      });
      let reloadedForSW = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!hadController || reloadedForSW) return;
        reloadedForSW = true;
        setTimeout(() => location.reload(), 600);
      });
    }
  </script>
</body>

</html>
